services:
  songbook:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: songbook-player:latest
    container_name: songbook-player
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Song data (read-only — songs/*.json, book.json, notation_mapping.json)
      - ../songs:/data/songs:ro
      - ../book.json:/data/book.json:ro
      - ../notation_mapping.json:/data/notation_mapping.json:ro
      # Images (read-only)
      - ../images:/data/images:ro
      # SQLite DB (persisted, writable)
      - songbook-db:/data/db
    environment:
      PORT: 3001
      NODE_ENV: production
      SONGBOOK_SONGS_DIR: /data/songs
      SONGBOOK_IMAGES_DIR: /data/images
      SONGBOOK_NOTATION: /data/notation_mapping.json
      SONGBOOK_DB: /data/db/songbook.db
      SONGBOOK_BOOK_JSON: /data/book.json

volumes:
  songbook-db:
    driver: local
