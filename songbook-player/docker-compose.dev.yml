services:
  server:
    image: node:20-alpine
    container_name: songbook-server-dev
    working_dir: /app/server
    command: sh -c "apk add --no-cache python3 make g++ && npm install && mkdir -p /data/db && node --watch index.js"
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app/server
      - server-node-modules:/app/server/node_modules
      - ../songs:/data/songs:ro
      - ../book.json:/data/book.json:ro
      - ../notation_mapping.json:/data/notation_mapping.json:ro
      - ../images:/data/images:ro
      - songbook-db-dev:/data/db
    environment:
      PORT: 3001
      NODE_ENV: development
      SONGBOOK_SONGS_DIR: /data/songs
      SONGBOOK_IMAGES_DIR: /data/images
      SONGBOOK_NOTATION: /data/notation_mapping.json
      SONGBOOK_DB: /data/db/songbook.db
      SONGBOOK_BOOK_JSON: /data/book.json

  client:
    image: node:20-alpine
    container_name: songbook-client-dev
    working_dir: /app/client
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - client-node-modules:/app/client/node_modules
    environment:
      VITE_API_BASE: http://localhost:3001
    depends_on:
      - server

volumes:
  server-node-modules:
  client-node-modules:
  songbook-db-dev:
    driver: local
