name: Deploy Next.js Platform to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "platform/**"
      - "data/**"
      - ".github/workflows/deploy-nextjs-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_BASE_PATH: "/songbook"
  NEXT_BUILD_STANDALONE: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: .

      - name: Generate song bundle
        working-directory: platform
        run: npm run prebuild

      - name: Build Next.js app (static export)
        run: npm run build --workspace=platform
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ env.NEXT_PUBLIC_BASE_PATH }}
          NEXT_BUILD_STANDALONE: ${{ env.NEXT_BUILD_STANDALONE }}

      - name: Configure Pages artifact
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "platform/out"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: artifact

      - name: Extract and deploy
        shell: bash
        run: |

          # Extract the artifact tar into a temp folder so the tar itself is never committed.
          mkdir -p extracted
          tar -xf artifact/artifact.tar -C extracted

          # Copy only extracted site contents into gh-pages worktree.
          shopt -s extglob
          rm -rf !(\.git|\.github|extracted)
          cp -a extracted/. .
          rm -rf extracted artifact

          # Configure git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Commit and push
          git add -A
          git commit -m "Deploy: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" --allow-empty
          git push origin gh-pages

