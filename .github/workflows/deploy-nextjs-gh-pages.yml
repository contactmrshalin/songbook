name: Deploy Next.js Platform to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "platform/**"
      - "data/**"
      - ".github/workflows/deploy-nextjs-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NEXT_PUBLIC_BASE_PATH: "/songbook"
  NEXT_BUILD_STANDALONE: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "platform/package-lock.json"

      - name: Install dependencies
        working-directory: platform
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Generate song bundle
        working-directory: platform
        run: node scripts/prebuild.mjs

      - name: Build Next.js app (static export)
        working-directory: platform
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ env.NEXT_PUBLIC_BASE_PATH }}
          NEXT_BUILD_STANDALONE: ${{ env.NEXT_BUILD_STANDALONE }}

      - name: Configure Pages artifact
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "platform/out"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
