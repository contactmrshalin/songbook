name: Deploy website to gh-pages (Hugo - Legacy)

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - "data/songs/**"
      - "data/book.json"
      - ".github/workflows/deploy-gh-pages.yml"
  workflow_dispatch:

# NOTE: The Next.js platform (platform/) is now the primary GitHub Pages deployment.
# This Hugo workflow is kept for backwards compatibility and can be removed once
# the Next.js deployment is fully verified. Both workflows will create artifacts
# in the gh-pages branch; ensure only one is active to avoid conflicts.

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Generate Hugo content from song data
        run: python site/scripts/generate_content.py
        # Auto-detects layout: songs/*.json (preferred) or songs.json (legacy)

      - name: Build Hugo site
        run: |
          # Destination is relative to --source (site/) -> site/public/
          hugo --source site --destination public --minify \
            --baseURL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site/public
          enable_jekyll: false
