{{ define "main" }}
  <div class="guide-page">
    <div class="guide-page-header">
      <a href="{{ "/" | relURL }}" class="back-link">
        {{ partial "icon.html" (dict "icon" "arrow-left" "size" "16") }}
        <span>Back to Songs</span>
      </a>
    </div>
    <h1 style="font-family: 'Libre Baskerville', Georgia, serif; font-size: 2rem; margin-bottom: 1.5rem;">{{ .Title }}</h1>
    <div class="notation-guide-body">
      {{ .Content }}
    </div>
  </div>
{{ end }}
